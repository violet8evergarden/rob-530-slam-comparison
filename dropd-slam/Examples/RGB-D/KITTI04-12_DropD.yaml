%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# Camera calibration and distortion parameters (OpenCV) 
Camera1.fx: 707.0912
Camera1.fy: 707.0912
Camera1.cx: 601.8873
Camera1.cy: 183.1104

Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0

Camera.width: 1241
Camera.height: 376

# Camera frames per second 
Camera.fps: 10

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

# Close/Far threshold. Baseline times.
Stereo.ThDepth: 40.0
Stereo.b: 0.53715

# Depth map values factor
RGBD.DepthMapFactor: 1.0 # #5000.0 for depth sensor

#--------------------------------------------------------------------------------------------
# Dynamic Scene Configuration
#--------------------------------------------------------------------------------------------
# Enable dynamic object detection and masking (requires YoloSegmentator)
# Set to 0 to disable, 1 to enable
System.DynamicScene: 0

#--------------------------------------------------------------------------------------------
# Model Paths Configuration
#--------------------------------------------------------------------------------------------
# Path to KeyNet detector model (for learned keypoint detection)
System.KeyNetModelPath: "/workspace/models/keynet.onnx"

# Path to YOLO segmentation model (for dynamic object detection)
System.YoloModelPath: "/workspace/models/yolo11s-seg.onnx"

# Depth estimation model configuration (optional - can override via command line)
System.DepthModelType: "unidepth"  # "unidepth" or "depthanything(NOT SUPPORTED FOR NOW)" - leave empty to disable
System.DepthModelPath: "/workspace/models/unidepthv2_with_cam.onnx"  # Path to depth model ONNX file - leave empty to disable
System.MaxDepthDistance: 40.0  # Maximum depth distance in meters (0 = no filtering)

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 2000

# ORB Extractor: Scale factor between levels in the scale pyramid     
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid    
ORBextractor.nLevels: 8

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast            
ORBextractor.iniThFAST: 12
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.6
Viewer.KeyFrameLineWidth: 2.0
Viewer.GraphLineWidth: 1.0
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.7
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -100.0
Viewer.ViewpointZ: -0.1
Viewer.ViewpointF: 2000.0