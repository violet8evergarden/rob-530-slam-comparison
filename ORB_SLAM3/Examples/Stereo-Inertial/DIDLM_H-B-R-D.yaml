%YAML:1.0

#--------------------------------------------------------------------------------------------
# System config
#--------------------------------------------------------------------------------------------
File.version: "1.0"
Camera.type: "PinHole"

#--------------------------------------------------------------------------------------------
# LEFT Camera parameters (Camera 1) - SCALED FOR 640x400
#--------------------------------------------------------------------------------------------
Camera1.fx: 402.57913
Camera1.fy: 402.08123
Camera1.cx: 336.18103
Camera1.cy: 205.80262

Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0

#--------------------------------------------------------------------------------------------
# RIGHT Camera parameters (Camera 2) - SCALED FOR 640x400
#--------------------------------------------------------------------------------------------
Camera2.fx: 401.46755
Camera2.fy: 400.91775
Camera2.cx: 327.89443
Camera2.cy: 216.67564

Camera2.k1: 0.0
Camera2.k2: 0.0
Camera2.p1: 0.0
Camera2.p2: 0.0

#--------------------------------------------------------------------------------------------
# Camera & Stereo Matrix Settings
#--------------------------------------------------------------------------------------------
Camera.width: 640
Camera.height: 400

Camera.fps: 30
Camera.RGB: 0 

Stereo.ThDepth: 50.0

# Transformation from Right Camera (2) to Left Camera (1).
Stereo.T_c1_c2: !!opencv-matrix
  rows: 4
  cols: 4
  dt: f
  data: [1.0, 0.0, 0.0,  0.1134169821,
         0.0, 1.0, 0.0, -0.0003729702,
         0.0, 0.0, 1.0, -0.0065959905,
         0.0, 0.0, 0.0,  1.0]

#--------------------------------------------------------------------------------------------
# IMU Parameters
#--------------------------------------------------------------------------------------------
# Transformation from Livox IMU to Left Camera
IMU.T_b_c1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [-0.14038222,  0.04466119,  0.98908959,  0.00942040,
          -0.99009325, -0.00344668, -0.14036904, -0.44752462,
          -0.00285997, -0.99899625,  0.04470259,  0.34578030,
           0.0,         0.0,         0.0,         1.0]

# Hardware Time Offset
IMU.TimeOffset: -0.069957

# IMU Noise (from imu.yaml)
IMU.NoiseGyro: 0.00256
IMU.NoiseAcc: 0.01989
IMU.GyroWalk: 0.0000307
IMU.AccWalk: 0.000538
IMU.Frequency: 200.0

IMU.InsertKFsWhenLost: 0

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures: 1200
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500.0
